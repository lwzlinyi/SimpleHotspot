# .github/workflows/android_fixed.yml
name: Android Build

# 触发条件：推送到 main/master 分支、PR、手动触发
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    # 必要：设置 Android 许可协议自动同意
    env:
      ANDROID_ACCEPT_SDK_LICENSE: true

    steps:
      # 步骤1：拉取仓库代码
      - uses: actions/checkout@v4

      # 步骤2：配置 JDK 17（适配新版 Android Gradle Plugin）
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle  # 自动缓存 Gradle 依赖

      # 步骤3：配置 Android SDK（升级到 34，兼容 JDK 17）
      - name: Setup Android SDK
        uses: android-actions/setup-android@v2
        with:
          sdk-version: '34'          # 升级到最新稳定版
          build-tools-version: '34.0.0' # 匹配 SDK 版本

      # 步骤4：授予 gradlew 执行权限（关键）
      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      # 步骤5：缓存 Gradle 依赖（加速构建）
      - name: Cache Gradle packages
        uses: actions/cache@v4  # 升级到 v4（v3 已弃用）
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      # 步骤6：构建 Debug 版 APK（无签名，新手优先）
      # 若要构建 Release 版，需额外配置签名密钥（见下方说明）
      - name: Build Debug APK with Gradle Wrapper
        run: ./gradlew clean assembleDebug  # 使用项目自带 gradlew，避免版本冲突

      # 步骤7：上传 APK 产物
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: CarHotspotAPK
          path: app/build/outputs/apk/debug/*.apk  # 对应 Debug 版路径
